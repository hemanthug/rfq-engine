    max_quantity: 4
    multiplier: 1.0
    warnings: []
  - min_quantity: 5
    max_quantity: 24
    multiplier: 0.9
    warnings: []
  - min_quantity: 25
    max_quantity: 99
    multiplier: 0.82
    warnings: []
  - min_quantity: 100
    max_quantity: null
    multiplier: 0.75
    warnings:
      - production_pricing_should_be_vendor_validated

feature_operations:
  through_hole_usd_each: 4.0
  blind_hole_usd_each: 6.0
  pocket_usd_each: 12.0
